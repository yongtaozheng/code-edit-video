name: Build Desktop App

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS-ARM64
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macOS-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows-x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: Linux-x64

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Linux 系统依赖
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libxcb1-dev \
            libxrandr-dev \
            libx11-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            nasm

      # Windows: 安装 NASM（openh264 编译需要）
      - name: Install NASM (Windows)
        if: matrix.platform == 'windows-latest'
        uses: ilammy/setup-nasm@v1

      # Windows: 设置 MSVC 开发环境
      - name: Setup MSVC dev environment (Windows)
        if: matrix.platform == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      # Windows: 设置 libclang 路径（bindgen 需要）
      - name: Set LIBCLANG_PATH (Windows)
        if: matrix.platform == 'windows-latest'
        run: echo "LIBCLANG_PATH=$env:PROGRAMFILES\LLVM\lib" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install npm dependencies
        run: npm ci

      # tauri-action 同时负责构建 + 创建 Release（打 tag 时）
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: npx tauri
          args: --target ${{ matrix.target }}
          # 打 tag 时自动创建/追加 Release
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: ${{ github.ref_type == 'tag' && format('Code Edit Video {0}', github.ref_name) || '' }}
          releaseBody: '跨平台桌面端安装包，由 GitHub Actions 自动构建。'
          releaseDraft: false
          prerelease: false
